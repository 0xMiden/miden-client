name = "ecdsa_auth"
description = "Ecdsa authentication component, for verifying ECDSA K256 Keccak signatures."
version = "0.1.0"
supported-types = ["RegularAccountUpdatableCode", "RegularAccountImmutableCode", "FungibleFaucet", "NonFungibleFaucet"]

[storage]
[[storage.slots]]
name = "miden::standards::auth::singlesig::pub_key"
description = "ECDSA K256 Keccak public key"
type = "miden::standards::auth::pub_key"

[[storage.slots]]
name = "miden::standards::auth::singlesig::scheme"
description = "Authentication scheme ID"
type = "miden::standards::auth::scheme"
