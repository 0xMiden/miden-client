name = "acl_auth"
description = "Access Control List (ACL) authentication component. Provides fine-grained authentication control based on procedure calls and note operations. Storage layout: pub_key - public key commitment, scheme - authentication scheme ID, config - ACL configuration, trigger_procedure_roots - map of procedure roots requiring authentication"
version = "0.1.0"
supported-types = ["RegularAccountUpdatableCode", "RegularAccountImmutableCode", "FungibleFaucet", "NonFungibleFaucet"]

[storage]
[[storage.slots]]
name = "miden::standards::auth::singlesig_acl::pub_key"
description = "Public key commitment"
type = "miden::standards::auth::pub_key"

[[storage.slots]]
name = "miden::standards::auth::singlesig_acl::scheme"
description = "Authentication scheme ID"
type = "miden::standards::auth::scheme"

[[storage.slots]]
name = "miden::standards::auth::singlesig_acl::config"
description = "ACL configuration: [num_tracked_procs, allow_unauthorized_output_notes, allow_unauthorized_input_notes, 0]"
type = [
    { name = "num_tracked_procs", type = "u32", description = "Number of procedures tracked for authentication" },
    { name = "allow_unauthorized_output_notes", type = "u32", description = "Whether unauthorized output notes are allowed (0=false, 1=true)" },
    { name = "allow_unauthorized_input_notes", type = "u32", description = "Whether unauthorized input notes are allowed (0=false, 1=true)" },
    { type = "void" },
]

[[storage.slots]]
name = "miden::standards::auth::singlesig_acl::trigger_procedure_roots"
description = "Map with trigger procedure roots that require authentication"
type = { key = "word", value = "word" }
