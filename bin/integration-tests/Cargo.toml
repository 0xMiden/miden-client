[package]
authors.workspace      = true
description            = "Integration Tests for the miden client library"
edition.workspace      = true
license.workspace      = true
name                   = "miden-client-integration-tests"
publish                = true
repository.workspace   = true
rust-version.workspace = true
version.workspace      = true

[[bin]]
name = "miden-client-integration-tests"
path = "src/main.rs"

[[test]]
name = "integration"
path = "tests/integration.rs"

[dependencies]
# Workspace dependencies
miden-client              = { features = ["std", "testing", "tonic"], workspace = true }
miden-client-sqlite-store = { workspace = true }

# External dependencies
anyhow             = { features = ["std"], workspace = true }
async-trait        = { workspace = true }
clap               = { features = ["derive", "env"], workspace = true }
num_cpus           = { version = "1.0" }
rand               = { workspace = true }
regex              = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { features = ["env-filter", "fmt", "json"], workspace = true }
uuid               = { workspace = true }

[lib]
doctest = false
test    = false
