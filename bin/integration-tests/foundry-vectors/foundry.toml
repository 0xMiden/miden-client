[profile.default]
libs           = ["lib"]
optimizer      = true
optimizer_runs = 200
out            = "out"
solc           = "0.8.20"
src            = "src"
test           = "test"
via_ir         = true

remappings = [
  "@agglayer/=lib/zkevm-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable4/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Emit extra output for test vector generation
ffi       = false
verbosity = 2

# Allow writing test vectors to file
fs_permissions = [{ access = "read-write", path = "test-vectors" }]
