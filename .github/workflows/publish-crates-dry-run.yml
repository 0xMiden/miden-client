name: Dry Run Publish Rust Crates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner

      - name: Update Rust toolchain
        run: |
          rustup update --no-self-update

      - name: Extract crate version from Cargo.toml
        id: extract_version
        run: |
          VERSION=$(yq eval '.workspace.package.version // .package.version' Cargo.toml)
          echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV

      - name: Dry run - publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          metadata="$(cargo metadata --no-deps --format-version 1)"

          mapfile -t publishable_crates < <(
            jq -r '[.packages[] | select(.publish != []) | .name] | sort | .[]' <<< "${metadata}"
          )

          for crate in "${publishable_crates[@]}"; do
            if cargo info --quiet --registry crates-io "${crate}@${version}" >/dev/null 2>&1; then
              echo "${crate} ${version} already exists on crates.io."
              exit 1
            fi
          done

          cargo publish --workspace --dry-run
