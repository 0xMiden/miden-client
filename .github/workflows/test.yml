name: Test

permissions:
  contents: read

on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_CACHE_KEY: rust-cache-2026.02.18

jobs:
  test:
    name: Unit tests
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: rustup update --no-self-update
      - name: Add Rust Cache
        uses: WarpBuilds/rust-cache@9d0cc3090d9c87de74ea67617b246e978735b1a1 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: false
      # Keep this on a released install-action commit with an explicit tool; shortcut tags can
      # trip zizmor's impostor-commit audit when they are later retagged.
      - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: nextest@0.9.122
      - name: make - test
        run: make test

  doc-tests:
    name: Documentation tests
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install rust
        run: rustup update --no-self-update
      - name: Add Rust Cache
        uses: WarpBuilds/rust-cache@9d0cc3090d9c87de74ea67617b246e978735b1a1 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: false
      - name: Run doc-tests
        run: make test-docs

  build-note-transport:
    name: Build note-transport
    runs-on: warp-ubuntu-latest-x64-8x
    outputs:
      note_transport_rev: ${{ steps.note-transport-rev.outputs.rev }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Resolve note-transport revision
        id: note-transport-rev
        run: echo "rev=$(git ls-remote https://github.com/0xMiden/miden-note-transport HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - name: Restore note-transport binary
        id: cache-note-transport
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cargo/bin/miden-note-transport-node-bin
          key: ${{ runner.os }}-note-transport-${{ steps.note-transport-rev.outputs.rev }}
      - name: Install Rust
        if: steps.cache-note-transport.outputs.cache-hit != 'true'
        run: rustup update --no-self-update
      - name: Install note-transport
        if: steps.cache-note-transport.outputs.cache-hit != 'true'
        env:
          NOTE_TRANSPORT_REV: ${{ steps.note-transport-rev.outputs.rev }}
        run: |
          [[ "$NOTE_TRANSPORT_REV" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Invalid note transport revision: $NOTE_TRANSPORT_REV"
            exit 1
          }
          cargo install --git https://github.com/0xMiden/miden-note-transport --rev "$NOTE_TRANSPORT_REV" --locked
      - name: Save note-transport binary
        if: steps.cache-note-transport.outputs.cache-hit != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/next'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cargo/bin/miden-note-transport-node-bin
          key: ${{ runner.os }}-note-transport-${{ steps.note-transport-rev.outputs.rev }}
      - name: Stage note-transport binary
        run: |
          mkdir -p target/release
          cp ~/.cargo/bin/miden-note-transport-node-bin target/release/miden-note-transport-node-bin
      - name: Upload note-transport binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: note-transport-artifact
          path: target/release/miden-note-transport-node-bin

  build-test-node:
    name: Build test node
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Resolve node revision
        id: node-rev
        run: echo "rev=$(./scripts/start-test-node.sh --print-rev)" >> "$GITHUB_OUTPUT"
      - name: Restore test node binaries
        id: cache-test-node
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: target/test-node/install
          key: ${{ runner.os }}-test-node-${{ steps.node-rev.outputs.rev }}
      # Persistent build dir so a rev bump recompiles only the crates that changed. The restore-key
      # prefix falls back to the previous rev's build dir to seed the incremental build.
      - name: Restore test node build cache
        if: steps.cache-test-node.outputs.cache-hit != 'true'
        id: cache-test-node-build
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: target/test-node/build
          key: ${{ runner.os }}-test-node-build-${{ steps.node-rev.outputs.rev }}
          restore-keys: |
            ${{ runner.os }}-test-node-build-
      - name: Install Rust
        if: steps.cache-test-node.outputs.cache-hit != 'true'
        run: rustup update --no-self-update
      - name: Build node binaries
        if: steps.cache-test-node.outputs.cache-hit != 'true'
        run: ./scripts/start-test-node.sh --install-only
      # Saved on every branch (not just `next`) so a PR's later pushes reuse its first build instead
      # of recompiling the node from scratch each push. Keyed on the node rev.
      - name: Save test node build cache
        if: steps.cache-test-node.outputs.cache-hit != 'true' && steps.cache-test-node-build.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: target/test-node/build
          key: ${{ runner.os }}-test-node-build-${{ steps.node-rev.outputs.rev }}
      - name: Save test node binaries
        if: steps.cache-test-node.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: target/test-node/install
          key: ${{ runner.os }}-test-node-${{ steps.node-rev.outputs.rev }}
      - name: Upload test node binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-node-artifact
          # `.crates.toml` is hidden and records the installed rev; the consumer jobs read it to
          # confirm the cached binaries match the pinned rev, so it must be uploaded.
          include-hidden-files: true
          path: target/test-node/install
      - name: Check binary existance
        run: file -E target/test-node/install/bin/miden-validator

  miden-bench:
    name: miden-bench smoke tests
    runs-on: warp-ubuntu-latest-x64-8x
    needs: [build-test-node]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: rustup update --no-self-update
      # Keep this on a released install-action commit with an explicit tool; shortcut tags can
      # trip zizmor's impostor-commit audit when they are later retagged.
      - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: nextest@0.9.122
      - name: Add Rust Cache
        uses: WarpBuilds/rust-cache@9d0cc3090d9c87de74ea67617b246e978735b1a1 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: false
      - name: Run miden-bench CLI tests
        run: make test-miden-bench
      - name: Fetch test node binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: test-node-artifact
          path: target/test-node/install
      - name: Restore test node permissions
        run: chmod +x target/test-node/install/bin/*
      - name: Start test node
        run: make start-node-background
      - name: Run miden-bench smoke tests
        run: make integration-test-miden-bench
      - name: Stop test node
        if: always()
        run: make stop-node

  integration-tests:
    name: Integration tests
    runs-on: warp-ubuntu-latest-x64-8x
    needs: [build-note-transport, build-test-node]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust
        run: rustup update --no-self-update
      # Keep this on a released install-action commit with an explicit tool; shortcut tags can
      # trip zizmor's impostor-commit audit when they are later retagged.
      - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: nextest@0.9.122
      - name: Add Rust Cache
        uses: WarpBuilds/rust-cache@9d0cc3090d9c87de74ea67617b246e978735b1a1 # v2.9.1
        with:
          shared-key: rust-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          save-if: false
      - name: Fetch test node binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: test-node-artifact
          path: target/test-node/install
      - name: Restore test node permissions
        run: chmod +x target/test-node/install/bin/*
      - name: Fetch note-transport binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: note-transport-artifact
          path: target/release
      - name: Restore note-transport permissions
        run: chmod +x target/release/miden-note-transport-node-bin
      # The test node now runs its own transaction prover (miden-remote-prover) for the ntx-builder;
      # see scripts/start-test-node.sh.
      - name: Start test node
        run: make start-node-background
      - name: Start note transport
        run: ./scripts/start-ci-service.sh miden-note-transport-node-bin 57292 target/release/miden-note-transport-node-bin
      - name: Run integration tests
        run: make integration-test-full
      - name: Stop test node
        if: always()
        run: make stop-node
      - name: Stop note transport
        if: always()
        run: make stop-note-transport
